scene:
  material_name: phong
  camera:
    interactive: true
    fov: 45.0
    view_dir: [0.0, 0.0, -1.0]
    position: [0.0, 0.0, 10.0]
  meshes:
    - path: meshes/plane.obj
    - path: meshes/sphere.obj
  lights:
    point_lights:
      - position: [0.0, 2.0, 0.0 ]
        color: [ 1.0, 1.0, 1.0 ]
        intensity: 0.01
  materials:
    - diffuse: [ 1.0, 1.0, 1.0 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
    - diffuse: [ 0.9, 0.9, 0.9 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
    - diffuse: [ 1, 0, 0 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
    - diffuse: [ 0, 1, 0 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
    - diffuse: [ 0, 0, 1 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
    - diffuse: [ 0.9, 0.9, 0.9 ]
      specular: [ 1.0, 1.0, 1.0 ]
      ambient: [ 1.0, 1.0, 1.0 ]
  nodes:
    - name: "Sphere"
      components:
        - Transform:
            position: [ 0.0, 0.0, 0.0 ]
            rotation: [ 0.0, 0.0, 0.0 ]
            scale: [ 1, 1, 1 ]
        - MeshRenderer:
            mesh: sphere
            material_idx: 5
    - name: "Room"
      components:
        - Transform:
            position: [ 0.0, 0.0, 0.0 ]
            rotation: [ 0, 0.0, 0.0 ]
            scale: [ 1.0, 1.0, 1.0 ]
      children:
        - name: "Floor"
          components:
            - Transform:
                position: [ 0.0, -2.5, 0.0 ]
                rotation: [ -90.0, 0.0, 0.0 ]
                scale: [ 5.0, 5.0, 5.0 ]
            - MeshRenderer:
                mesh: plane
                material_idx: 1
        - name: "Ceil"
          components:
            - Transform:
                position: [ 0.0, 2.5, 0.0 ]
                rotation: [ 90.0, 0.0, 0.0 ]
                scale: [ 5.0, 5.0, 5.0 ]
            - MeshRenderer:
                mesh: plane
                material_idx: 1
        - name: "Left"
          components:
            - Transform:
                position: [ -2.5, 0.0, 0.0 ]
                rotation: [ 0.0, 90.0, 0.0 ]
                scale: [ 5.0, 5.0, 5.0 ]
            - MeshRenderer:
                mesh: plane
                material_idx: 2
        - name: "Right"
          components:
            - Transform:
                position: [ 2.5, 0.0, 0.0 ]
                rotation: [ 0.0, -90.0, 0.0 ]
                scale: [ 5.0, 5.0, 5.0 ]
            - MeshRenderer:
                mesh: plane
                material_idx: 3
        - name: "Back"
          components:
            - Transform:
                position: [ 0.0, 0.0, -2.5 ]
                rotation: [ 0.0, 0.0, 0.0 ]
                scale: [ 5.0, 5.0, 5.0 ]
            - MeshRenderer:
                mesh: plane
                material_idx: 4